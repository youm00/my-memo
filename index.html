<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gist Memo</title>

<link rel="manifest" href="manifest.json">

<style>
:root{
  --bg:#f5f2eb;
  --paper:#fdfcf8;
  --border:#dedad2;
  --accent:#c8441a;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:#222;
}

#offline-banner{
  display:none;
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#e8a020;
  color:#fff;
  text-align:center;
  padding:6px;
  font-size:12px;
  z-index:9999;
}
#offline-banner.show{
  display:block;
}

#topbar{
  padding:12px;
  background:var(--paper);
  border-bottom:1px solid var(--border);
  font-weight:bold;
}

#main{
  display:flex;
  height:calc(100vh - 50px);
}

#memo-list{
  width:220px;
  border-right:1px solid var(--border);
  background:var(--paper);
  overflow:auto;
}

.memo-item{
  padding:10px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}

#editor{
  flex:1;
  display:flex;
  flex-direction:column;
}

#memo-body{
  flex:1;
  border:none;
  outline:none;
  padding:12px;
  font-family:monospace;
}

#save-btn{
  margin:12px;
  padding:8px;
  background:var(--accent);
  color:white;
  border:none;
}
</style>
</head>

<body>

<div id="offline-banner">📡 オフライン中</div>

<div id="topbar">gist.memo</div>

<div id="main">
  <div id="memo-list"></div>
  <div id="editor">
    <textarea id="memo-body"></textarea>
    <button id="save-btn">保存</button>
  </div>
</div>

<script>

/* ===========================
   Service Worker 登録
=========================== */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.log('SW error:', err));
  });
}

/* ===========================
   オフラインバナー安全版
=========================== */
function updateOfflineBanner() {
  try {
    const banner = document.getElementById('offline-banner');
    if (!banner) return;

    const isOffline = !navigator.onLine;

    if (isOffline) {
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
    }
  } catch(e){
    console.log('offline check error', e);
  }
}

window.addEventListener('online', updateOfflineBanner);
window.addEventListener('offline', updateOfflineBanner);

document.addEventListener('DOMContentLoaded', () => {
  updateOfflineBanner();
});

/* ===========================
   メモローカル保存
=========================== */

let memos = [];
let currentId = null;

function renderList(){
  const list = document.getElementById('memo-list');
  if(!list) return;
  list.innerHTML = '';

  memos.forEach(m=>{
    const el = document.createElement('div');
    el.className = 'memo-item';
    el.textContent = m.title || '無題';
    el.onclick = ()=>selectMemo(m.id);
    list.appendChild(el);
  });
}

function selectMemo(id){
  currentId = id;
  const m = memos.find(x=>x.id===id);
  const area = document.getElementById('memo-body');
  if(area && m){
    area.value = m.body || '';
  }
}

function save(){
  if(!currentId) return;
  localStorage.setItem('gm_cached_memos', JSON.stringify(memos));
}

document.getElementById('save-btn').addEventListener('click', save);

document.addEventListener('DOMContentLoaded', ()=>{
  const cached = localStorage.getItem('gm_cached_memos');
  if(cached){
    try{
      memos = JSON.parse(cached);
      renderList();
      if(memos.length) selectMemo(memos[0].id);
    }catch(e){}
  }
});

</script>

</body>
</html>
