<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gist Memo</title>

<style>
:root{
  --bg:#f5f2eb;
  --paper:#fdfcf8;
  --border:#dedad2;
  --accent:#c8441a;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:#222;
}

#topbar{
  padding:12px;
  background:var(--paper);
  border-bottom:1px solid var(--border);
  font-weight:bold;
}

#main{
  display:flex;
  height:calc(100vh - 50px);
}

#memo-list{
  width:220px;
  border-right:1px solid var(--border);
  background:var(--paper);
  overflow:auto;
}

.memo-item{
  padding:10px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}

#editor{
  flex:1;
  display:flex;
  flex-direction:column;
}

#memo-body{
  flex:1;
  border:none;
  outline:none;
  padding:12px;
  font-family:monospace;
}

#save-btn{
  margin:12px;
  padding:8px;
  background:var(--accent);
  color:white;
  border:none;
}
</style>
</head>

<body>

<div id="topbar">gist.memo</div>

<div id="main">
  <div id="memo-list"></div>
  <div id="editor">
    <textarea id="memo-body"></textarea>
    <button id="save-btn">保存</button>
  </div>
</div>

<script>
let memos = [];
let currentId = null;

function renderList(){
  const list = document.getElementById('memo-list');
  list.innerHTML = '';

  memos.forEach(m=>{
    const el = document.createElement('div');
    el.className = 'memo-item';
    el.textContent = m.title || '無題';
    el.onclick = ()=>selectMemo(m.id);
    list.appendChild(el);
  });
}

function selectMemo(id){
  currentId = id;
  const m = memos.find(x=>x.id===id);
  document.getElementById('memo-body').value = m.body || '';
}

function save(){
  localStorage.setItem('gm_cached_memos', JSON.stringify(memos));
}

document.getElementById('save-btn').addEventListener('click', save);

document.addEventListener('DOMContentLoaded', ()=>{
  const cached = localStorage.getItem('gm_cached_memos');
  if(cached){
    try{
      memos = JSON.parse(cached);
      renderList();
      if(memos.length) selectMemo(memos[0].id);
    }catch(e){}
  }
});
</script>

</body>
</html>
