<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gist Memo</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:#f5f2eb;
}

/* ===== トップバー ===== */
#topbar{
  background:#fdfcf8;
  padding:0.8rem 1rem;
  border-bottom:1px solid #dedad2;
  display:flex;
  align-items:center;
  gap:1rem;
  position:relative;
  z-index:10;
}

/* ===== オフラインバナー ===== */
#offline-banner{
  display:none;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
  background:#e8a020;
  color:white;
  text-align:center;
  font-size:0.75rem;
  padding:0.45rem;
  letter-spacing:0.04em;
}
#offline-banner.show{
  display:block;
}

/* 簡易レイアウト */
#main{
  display:flex;
  height:calc(100vh - 50px);
}
#memo-list{
  width:220px;
  border-right:1px solid #dedad2;
  overflow:auto;
  background:#fdfcf8;
}
.memo-item{
  padding:0.7rem;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.memo-item:hover{
  background:#f0ede6;
}
#editor{
  flex:1;
  display:flex;
  flex-direction:column;
}
#memo-body{
  flex:1;
  padding:1rem;
  border:none;
  outline:none;
  font-family:monospace;
}
button{
  margin:0.5rem;
  padding:0.5rem 1rem;
}
</style>
</head>

<body>

<div id="offline-banner">📡 オフライン中</div>

<div id="topbar">
  <h1>gist.memo</h1>
  <span id="status-badge">—</span>
</div>

<div id="main">
  <div id="memo-list"></div>
  <div id="editor">
    <textarea id="memo-body"></textarea>
    <button onclick="save()">保存</button>
  </div>
</div>

<div id="overlay">
  <input id="inp-token" placeholder="GitHub Token">
  <input id="inp-gist" placeholder="Gist ID">
  <button id="btn-connect">接続</button>
</div>

<script>

/* ===== Service Worker ===== */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}

/* ===== State ===== */
let token='', gistId='', memos=[], currentId=null;

/* ===== 初期化 ===== */
window.addEventListener('DOMContentLoaded', () => {

  updateOfflineBanner();

  token  = localStorage.getItem('gm_token');
  gistId = localStorage.getItem('gm_gist_id');

  const cached = localStorage.getItem('gm_cached_memos');

  if (cached) {
    memos = JSON.parse(cached);
    renderList();
    if (memos.length > 0) selectMemo(memos[0].id);
  }

  if (token && gistId) {
    connect(false);
  }
});

/* ===== オフラインバナー制御 ===== */
function updateOfflineBanner(){
  const banner=document.getElementById('offline-banner');
  const topbar=document.getElementById('topbar');

  if(!navigator.onLine){
    banner.classList.add('show');
    topbar.style.marginTop=banner.offsetHeight+'px';
  }else{
    banner.classList.remove('show');
    topbar.style.marginTop='';
  }
}

window.addEventListener('offline',updateOfflineBanner);
window.addEventListener('online',updateOfflineBanner);

/* ===== 接続 ===== */
document.getElementById('btn-connect').addEventListener('click',()=>connect(true));

async function connect(showToast=true){

  token=document.getElementById('inp-token').value.trim();
  gistId=document.getElementById('inp-gist').value.trim();

  if(!token||!gistId)return;

  try{
    const res=await fetch('https://api.github.com/gists/'+gistId,{
      headers:{Authorization:'token '+token}
    });
    if(!res.ok)throw new Error();

    const data=await res.json();

    localStorage.setItem('gm_token',token);
    localStorage.setItem('gm_gist_id',gistId);

    loadFromGist(data);
    document.getElementById('overlay').style.display='none';

  }catch(e){
    const cached=localStorage.getItem('gm_cached_memos');
    if(cached){
      memos=JSON.parse(cached);
      renderList();
      if(memos.length>0)selectMemo(memos[0].id);
      document.getElementById('overlay').style.display='none';
    }
  }
}

/* ===== Gist読込 ===== */
function loadFromGist(data){
  memos=[];
  for(const fname in data.files){
    if(!fname.startsWith('memo_'))continue;
    const id=fname.replace('memo_','').replace('.json','');
    const m=JSON.parse(data.files[fname].content);
    memos.push({id,...m});
  }
  renderList();
  localStorage.setItem('gm_cached_memos',JSON.stringify(memos));
}

/* ===== 保存 ===== */
async function save(){

  if(!currentId)return;

  if(!navigator.onLine){
    localStorage.setItem('gm_cached_memos',JSON.stringify(memos));
    return;
  }

  const files={};
  memos.forEach(m=>{
    files['memo_'+m.id+'.json']={content:JSON.stringify(m)};
  });

  await fetch('https://api.github.com/gists/'+gistId,{
    method:'PATCH',
    headers:{
      Authorization:'token '+token,
      'Content-Type':'application/json'
    },
    body:JSON.stringify({files})
  });

  localStorage.setItem('gm_cached_memos',JSON.stringify(memos));
}

/* ===== UI ===== */
function renderList(){
  const list=document.getElementById('memo-list');
  list.innerHTML='';
  memos.forEach(m=>{
    const el=document.createElement('div');
    el.className='memo-item';
    el.textContent=m.title||'無題';
    el.onclick=()=>selectMemo(m.id);
    list.appendChild(el);
  });
}

function selectMemo(id){
  currentId=id;
  const m=memos.find(x=>x.id===id);
  document.getElementById('memo-body').value=m.body||'';
}

</script>
</body>
</html>
