<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gist Memo</title>

<link rel="manifest" href="manifest.json">

<style>
/* 既存CSSはそのまま使用（省略せずフル利用してください） */
</style>

<script>
/* ===============================
   Service Worker 登録
================================= */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.warn('SW error:', e));
  });
}

/* ===============================
   グローバル状態
================================= */
let token='', gistId='', memos=[], currentId=null, savedSnapshot=null;
let knownFiles = new Set();
let backupKeys = [];
let isOffline = !navigator.onLine;

/* ===============================
   初期化
================================= */
window.addEventListener('DOMContentLoaded', () => {
  token  = localStorage.getItem('gm_token')   || '';
  gistId = localStorage.getItem('gm_gist_id') || '';

  if (token && gistId) {
    connect(false);
  } else {
    document.getElementById('overlay').style.display = 'flex';
  }

  updateOfflineBanner();
});

/* ===============================
   接続
================================= */
async function connect(showFeedback=true) {
  try {
    const data = await apiGet();
    loadFromGist(data);

    localStorage.setItem('gm_token', token);
    localStorage.setItem('gm_gist_id', gistId);

    document.getElementById('overlay').style.display = 'none';
    setStatus('接続済み');
  } catch(e) {

    // ★ オフライン時はローカルキャッシュから復元
    const cached = localStorage.getItem('gm_cached_memos');
    if (cached) {
      memos = JSON.parse(cached);
      savedSnapshot = deepClone(memos);
      renderList();
      if (memos.length > 0) selectMemo(memos[0].id);
      document.getElementById('overlay').style.display = 'none';
      setStatus('オフライン表示');
      toast('オフラインモードで起動しました');
      return;
    }

    setStatus('接続失敗');
    toast('接続に失敗しました', true);
  }
}

/* ===============================
   Gist読み込み
================================= */
function loadFromGist(data) {
  const files = data.files;
  const loaded = [];

  for (const fname of Object.keys(files)) {
    if (!fname.startsWith('memo_')) continue;
    try {
      const m = JSON.parse(files[fname].content);
      const id = fname.replace('memo_','').replace('.json','');
      loaded.push({ id, ...m });
    } catch(e){}
  }

  memos = loaded.sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));
  savedSnapshot = deepClone(memos);

  renderList();
  if (memos.length > 0) selectMemo(memos[0].id);

  /* ★ 常時ローカル保存（超重要） */
  localStorage.setItem('gm_cached_memos', JSON.stringify(memos));
}

/* ===============================
   保存
================================= */
async function save() {
  if (!navigator.onLine) {
    localStorage.setItem('gm_cached_memos', JSON.stringify(memos));
    toast('オフライン保存しました');
    return;
  }

  try {
    await apiPatch(buildPatch());
    savedSnapshot = deepClone(memos);

    localStorage.setItem('gm_cached_memos', JSON.stringify(memos));
    toast('保存しました ✓');
  } catch(e) {
    toast('保存失敗', true);
  }
}

/* ===============================
   API
================================= */
async function apiGet() {
  const res = await fetch('https://api.github.com/gists/'+gistId,{
    headers:{ Authorization:'token '+token }
  });
  if(!res.ok) throw new Error();
  return res.json();
}

async function apiPatch(files) {
  const res = await fetch('https://api.github.com/gists/'+gistId,{
    method:'PATCH',
    headers:{
      Authorization:'token '+token,
      'Content-Type':'application/json'
    },
    body: JSON.stringify({files})
  });
  if(!res.ok) throw new Error();
}

/* ===============================
   UI補助
================================= */
function renderList(){
  const list=document.getElementById('memo-list');
  list.innerHTML='';
  memos.forEach(m=>{
    const el=document.createElement('div');
    el.textContent=m.title||'無題';
    el.onclick=()=>selectMemo(m.id);
    list.appendChild(el);
  });
}

function selectMemo(id){
  currentId=id;
  const m=memos.find(x=>x.id===id);
  if(!m)return;
  document.getElementById('memo-body').value=m.body||'';
}

function buildPatch(){
  const files={};
  memos.forEach(m=>{
    files['memo_'+m.id+'.json']={content:JSON.stringify(m)};
  });
  return files;
}

function deepClone(x){return JSON.parse(JSON.stringify(x));}

function setStatus(msg){
  const el=document.getElementById('status-badge');
  if(el) el.textContent=msg;
}

function toast(msg,isErr=false){
  console.log(msg);
}

/* ===============================
   オフライン検知
================================= */
function updateOfflineBanner(){
  const banner=document.getElementById('offline-banner');
  if(!banner)return;
  if(!navigator.onLine) banner.style.display='block';
  else banner.style.display='none';
}

window.addEventListener('offline',updateOfflineBanner);
window.addEventListener('online',updateOfflineBanner);

</script>
</head>

<body>

<div id="topbar">
  <h1>gist.memo</h1>
  <span id="status-badge">—</span>
</div>

<div id="memo-list"></div>
<textarea id="memo-body" style="width:100%;height:200px;"></textarea>
<button onclick="save()">保存</button>

<div id="overlay" style="display:none;">
  <input id="token" placeholder="Token">
  <input id="gist" placeholder="Gist ID">
</div>

<div id="offline-banner" style="display:none;background:#e8a020;color:#fff;text-align:center;">
オフライン中
</div>

</body>
</html>
